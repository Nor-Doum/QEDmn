<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exams</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    background: #f4f4f7;
    margin: 0;
    min-height: 100vh;
  }
  header {
    background: #fff;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  header h1 { font-size: 18px; margin: 0; }
  #logoutBtn {
    padding: 8px 16px;
    background: #ef4444;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  #logoutBtn:hover { background: #dc2626; }
  main {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 20px;
  }
  #checking {
    text-align: center;
    color: #666;
    margin-top: 100px;
  }
  .lesson {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .lesson h2 { margin: 0 0 8px; font-size: 17px; }
  .lesson p { margin: 0; color: #555; font-size: 14px; }
  .pending-card {
    background: #fff;
    max-width: 480px;
    margin: 100px auto 0;
    padding: 32px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
  }
  .pending-card h2 { font-size: 19px; margin-bottom: 10px; }
  .pending-card p { color: #555; font-size: 14px; line-height: 1.5; }
  .pending-card a { color: #2563eb; }
</style>
</head>
<body>

<div id="checking">Checking your account...</div>

<div id="pending" style="display:none;">
  <div class="pending-card">
    <h2 id="pendingTitle">Payment not confirmed yet</h2>
    <p id="pendingText">
      We don't see a confirmed payment for your account yet.
      If you already paid via BaridiMob or in person, please allow a little time for confirmation,
      or make sure you've submitted the <a href="booking.html">booking form</a>.
    </p>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <h1>Your Exams</h1>
    <button id="logoutBtn">Log Out</button>
  </header>
  <main id="lessonList">
    <!-- Exams load here once logged in and approved -->
  </main>
</div>

<script type="module">
  import { auth } from "./firebase-config.js";
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  // Paste the /exec URL from your Apps Script deployment here
  const CONTENT_ENDPOINT = "https://script.google.com/macros/s/AKfycbwmdgmmQV6E6XDN5TexCcAA759NviDqz-bwEonFgYyNivlejuW6PMgy1uJtB6bi2NOLBw/exec";

  // Tiers allowed on THIS page
  const ALLOWED_TIERS = ["premium"];

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "access.html";
      return;
    }

    try {
      const url = `${CONTENT_ENDPOINT}?email=${encodeURIComponent(user.email)}&t=${Date.now()}`;
      const response = await fetch(url, { cache: "no-store" });
      const data = await response.json();

      document.getElementById("checking").style.display = "none";

      if (data.tier && ALLOWED_TIERS.includes(data.tier)) {
        document.getElementById("app").style.display = "block";
        loadLessons();
      } else if (data.tier) {
        // Approved (e.g. Basic or Standard), but their plan doesn't include Exams
        document.getElementById("pendingTitle").textContent = "Not included in your plan";
        document.getElementById("pendingText").innerHTML =
          "Exams are available on the Premium plan. Contact me if you'd like to upgrade.";
        document.getElementById("pending").style.display = "block";
      } else {
        // No confirmed payment at all
        document.getElementById("pending").style.display = "block";
      }
    } catch (error) {
      document.getElementById("checking").textContent =
        "Couldn't check your account status. Please refresh the page.";
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "access.html";
  });

  function loadLessons() {
    const lessons = [
      { title: "Exam prep 1", description: "Practice exam material." }
    ];

    const list = document.getElementById("lessonList");
    list.innerHTML = lessons.map(l => `
      <div class="lesson">
        <h2>${l.title}</h2>
        <p>${l.description}</p>
      </div>
    `).join("");
  }
</script>

</body>
</html>
