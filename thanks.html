<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    background: #f4f4f7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  .card {
    background: #fff;
    padding: 44px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 440px;
    text-align: center;
  }
  .check {
    font-size: 44px;
    margin-bottom: 12px;
  }
  h1 { font-size: 22px; margin: 0 0 12px; color: #15803d; }
  p {
    color: #555;
    font-size: 15px;
    line-height: 1.6;
    margin: 0 0 20px;
  }
  a {
    display: inline-block;
    color: #2563eb;
    font-size: 14px;
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="check">✅</div>
  <h1>Thank you for choosing QEDmn!</h1>
  <p>
    Your booking has been received. Your login will be confirmed within
    a few minutes to about an hour, once your payment is verified.
  </p>
  <a href="index.html">Back to homepage</a>
</div>

</body>
</html>
